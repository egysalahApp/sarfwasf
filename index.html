        @keyframes fadeIn {
            from {

                transform: translateY(15px);

                opacity: 1;
                transform: translateY(0);
            }
        }

            }
        }

        @keyframes shake {

            10%,

            80% {

                        { text: 'علامة جر كلمة (أُخَرَ) في قوله تعالى "فعدة من أيام أُخر" هي:', options: ['الكسرة', 'الفتحة', 'السكون'], correct: 1, hint: 'الممنوع من الصرف يجر بـ..', explanation: 'تُجر بالفتحة نيابة عن الكسرة لأنها ممنوعة من الصرف.' },

        // =========================================================================

        // =========================================================================
        // وظائف جافا سكريبت الأساسية
        // =========================================================================
        const toArabicNum = (num) => {
            const arabicNumbers = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return String(num).split('').map(c => arabicNumbers[c] || c).join('');
        };

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        const App = {
            state: { activeTab: '', progress: {}, sectionData: {} },
            init() {
                document.title = APP_DATA.pageTitle;
                if (APP_DATA.sections.length > 0) this.state.activeTab = APP_DATA.sections[0].id;
                this.initSectionData();
                this.renderLayout();
                this.updateUI();
            },
            initSectionData() {
                this.state.progress = {};
                this.state.sectionData = {};
                APP_DATA.sections.forEach(sec => {
                    if (sec.type === 'intro') { this.state.progress[sec.id] = { answered: 0, total: 0, score: 0 }; }
                    else if (sec.type === 'mcq') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = sec.questions.map(q => {
                            let opts = q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct }));
                            return { originalQuestion: q, options: shuffleArray(opts), answered: false, selectedOption: null, showHint: false };
                        });
                    }
                    else if (sec.type === 'classify') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        let placedItems = {};
                        sec.categories.forEach(c => placedItems[c.id] = []);
                        this.state.sectionData[sec.id] = { questions: shuffleArray(sec.questions).map(q => ({ originalQuestion: q, showHint: false })), currentIndex: 0, status: 'idle', placedItems: placedItems, animatingOut: false };
                    }
                    else if (sec.type === 'error_correction') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = sec.questions.map(q => {
                            let opts = q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correctOptionIndex }));
                            return { originalQuestion: q, options: shuffleArray(opts), step: 1, selectedWordIndex: null, selectedOption: null, showHint: false, shakeWordIndex: null };
                        });
                    }
                    else if (sec.type === 'flashcards') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.cards.length, score: 0 };
                        this.state.sectionData[sec.id] = { cards: sec.cards, currentIndex: 0, isFlipped: false, animatingOut: false, showHint: false };
                    }
                    else if (sec.type === 'sort') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = {
                            questions: sec.questions.map(q => {
                                let opts = q.options.map((opt, i) => ({ text: opt, isCorrect: i === q.correct }));
                                return { originalQuestion: q, options: opts, showHint: false };
                            }),
                            currentIndex: 0, status: 'idle', animatingOut: false
                        };
                    }
                    // --- إضافة نوع النشاط الجديد (صائد الكلمات) ---
                    else if (sec.type === 'spotting') {
                        this.state.progress[sec.id] = { answered: 0, total: sec.questions.length, score: 0 };
                        this.state.sectionData[sec.id] = sec.questions.map(q => {
                            return { originalQuestion: q, answered: false, selectedWordIndex: null, showHint: false, shakeWordIndex: null };
                        });
                    }
                });
            },
            renderLayout() {

                let sectionsContainers = '';

                    <div id="main-header" class="w-full text-center py-6 bg-transparent flex flex-col items-center">
                        <a href="${APP_DATA.youtubeLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center gap-2 text-2xl font-bold text-purple-900 hover:text-purple-800 hover:scale-105 transition-transform duration-300 mb-1">
                            <span>${APP_DATA.headerTitle}</span>${ICONS.youtube}
                        </a>
                        <h2 class="text-lg font-bold text-slate-600 hover:text-slate-700 hover:-translate-x-1 transition-transform duration-300 cursor-default inline-block">${APP_DATA.headerSubtitle}</h2>

                    <div id="sticky-tabs-container" class="sticky top-0 z-50 bg-[#f8fafc]/95 backdrop-blur-md shadow-sm border-b border-slate-200">

                        </div>

                    </div>
                    <main class="container mx-auto px-4 pb-8 max-w-4xl flex-grow min-h-[75vh]">
                        <div id="scroll-target"></div>
                        <h1 class="text-center text-2xl md:text-3xl font-semibold text-slate-700 pt-6 mb-6 bg-transparent">${APP_DATA.pageTitle.split('|')[0]}</h1>

                    </footer>
                `;
            },
            updateUI() {
                this.updateTabs();
                APP_DATA.sections.forEach(sec => {
                    const el = document.getElementById(`section-${sec.id}`);
                    if (el) {
                        if (this.state.activeTab === sec.id) {
                            el.className = 'block';
                            el.innerHTML = this.renderSection(sec);

                    }
                });
                this.checkFinalEvaluation();
            },
            updateTabs() {
                const wrapper = document.getElementById('tabs-wrapper');
                let html = '';
                APP_DATA.sections.forEach(section => {
                    const isActive = this.state.activeTab === section.id;
                    const secProgress = this.state.progress[section.id];
                    const isDone = secProgress.total > 0 && secProgress.answered === secProgress.total;
                    let activeClass = isActive ? `bg-${section.theme}-600 text-white border-${section.theme}-600 shadow-md` : "bg-white text-slate-600 border-slate-200";
                    html += `
                        <button id="tab-${section.id}" type="button" onclick="App.handleTabChange('${section.id}')" class="shrink-0 whitespace-nowrap px-6 py-2 rounded-full font-semibold text-lg md:text-xl border-2 transition-all flex items-center justify-center gap-2 ${activeClass}">
                            ${section.title}${isDone && !isActive ? `<span class="text-emerald-600">${ICONS.checkCircle}</span>` : ''}

                wrapper.innerHTML = html;
                const currentProgress = this.state.progress[this.state.activeTab];

                const progressBar = document.getElementById('progress-bar');
                const theme = APP_DATA.sections.find(s => s.id === this.state.activeTab).theme;
                progressBar.className = `h-full transition-all duration-500 ease-out bg-${theme}-500`;
                progressBar.style.width = `${progressPercent}%`;
            },
            renderSection(sectionData) {
                switch (sectionData.type) {
                    case 'intro': return this.renderIntro(sectionData);
                    case 'classify': return this.renderClassify(sectionData);

                    case 'spotting': return this.renderSpotting(sectionData); // تفعيل دالة العرض الجديدة
                    default: return '';
                }
            },
            renderIntro(sectionData) {
                let headerHTML = '';
                if (sectionData.description) {
                    headerHTML += `<div class="text-center mb-10 fade-in"><p class="text-lg md:text-xl text-${sectionData.theme}-800 font-semibold bg-${sectionData.theme}-50 bg-opacity-60 p-4 md:p-5 rounded-2xl shadow-sm inline-block w-full">${sectionData.description}</p></div>`;
                }
                let gridHTML = '<div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 w-full fade-in">';
                
                sectionData.content.forEach(block => {
                    gridHTML += `
                    <div class="bg-white border-2 border-${block.theme}-200 rounded-[2rem] p-6 md:p-8 shadow-sm hover:-translate-y-2 hover:shadow-xl transition-all duration-300 flex flex-col items-center text-center group cursor-default">
                        
                        <!-- Icon Box -->
                        <div class="w-16 h-16 md:w-20 md:h-20 bg-${block.theme}-100 rounded-full flex items-center justify-center text-3xl md:text-4xl mb-6 group-hover:scale-110 group-hover:-rotate-3 transition-transform duration-300 shrink-0">
                            ${block.icon}
                        </div>
                        
                        <!-- Title & Desc -->
                        <h3 class="text-2xl md:text-3xl font-bold text-${block.theme}-800 mb-4 leading-snug w-full">${block.title}</h3>

                            <div class="text-lg md:text-xl font-bold text-${block.theme}-900 leading-relaxed">${block.examples}</div>
                        </div>
                        
                    </div>`;
                });
                
                gridHTML += '</div>';
                return `<div class="max-w-4xl mx-auto pb-6">${headerHTML}${gridHTML}<div class="flex justify-center mt-12 pt-4 fade-in"><button onclick="App.handleNextSection()" class="bg-${sectionData.theme}-600 hover:bg-${sectionData.theme}-700 text-white font-semibold text-xl md:text-2xl py-4 px-12 rounded-full shadow-lg flex items-center gap-3 active:scale-95 transition-all duration-300">هيا نبدأ التدريبات ${ICONS.arrowLeft}</button></div></div>`;
            },
            renderStandardSection(sectionData) {
                const sectionId = sectionData.id;
                const progress = this.state.progress[sectionId];
                const isComplete = progress.total > 0 && progress.answered === progress.total;
                const questions = this.state.sectionData[sectionId];
                let html = '<div class="fade-in">';
                if (sectionData.description) { html += `<div class="text-center mb-8"><p class="text-lg md:text-xl text-${sectionData.theme}-800 font-semibold bg-${sectionData.theme}-50 bg-opacity-60 p-4 md:p-5 rounded-2xl shadow-sm inline-block w-full">${sectionData.description}</p></div>`; }
                questions.forEach((qState, idx) => { html += `<div id="${sectionId}-wrapper-${idx}">${this.renderQuestionCard(qState, idx, sectionId, sectionData.theme, sectionData.type)}</div>`; });
                if (isComplete) { html += `<div class="mt-12 p-8 md:p-10 bg-white border-2 border-${sectionData.theme}-200 rounded-2xl shadow-sm text-center max-w-2xl mx-auto w-full"><h3 class="text-2xl md:text-3xl font-semibold text-slate-700 mb-6">نتيجتك في قسم (${sectionData.title})</h3><div class="text-4xl md:text-5xl font-bold text-${sectionData.theme}-600 flex items-center justify-center gap-3"><span>${toArabicNum(progress.score)}</span><span class="text-2xl md:text-3xl text-slate-400 font-medium mt-1">من</span><span>${toArabicNum(progress.total)}</span></div></div>`; }
                html += '</div>'; html += this.renderSectionFooterControls(sectionId, isComplete); return html;
            },
            renderQuestionCard(qState, idx, sectionId, theme, type) {

                const hintFadeClass = qState.hintAnimate ? 'smooth-expand' : '';

                let optionsHTML = '';

                        if (opt.isCorrect) btnClass += "bg-emerald-50 border-emerald-500 text-emerald-800 shadow-sm";
                        else if (selectedOption === opt) btnClass += "bg-rose-50 border-rose-500 text-rose-800 shadow-sm";
                        else btnClass += "bg-slate-50 border-slate-100 text-slate-400 opacity-60";
                        btnClass += " cursor-default";
                    }
                    let numClass = `w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full text-xl md:text-2xl font-bold shrink-0 transition-all `;
                    if (answered) numClass += opt.isCorrect ? 'bg-emerald-500 text-white shadow-sm' : (selectedOption === opt ? 'bg-rose-500 text-white shadow-sm' : 'bg-slate-100 text-slate-400 border border-slate-200');
                    else numClass += `bg-white text-${theme}-600 shadow-md border border-slate-100`;

                    optionsHTML += `<button ${answered ? 'disabled' : ''} onclick="App.handleAnswer('${sectionId}', ${idx}, ${optIdx})" class="${btnClass}">${numberingHTML}<span class="relative z-10 flex-grow text-right">${opt.text}</span>${answered && opt.isCorrect ? ICONS.checkCircle : ''}${answered && selectedOption === opt && !opt.isCorrect ? ICONS.xCircle : ''}</button>`;
                });
                return `<div id="${sectionId}-q-${idx}" class="bg-white rounded-2xl p-5 md:p-6 shadow-sm border border-slate-200 mb-8 relative transition-colors duration-300 flex flex-col justify-start ${ringClass}"><div class="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-100 mb-6 w-full mx-auto"><div class="flex items-center justify-between mb-4"><span class="text-${theme}-600 font-bold text-lg md:text-xl">السؤال ${toArabicNum(idx + 1)}</span><button onclick="App.toggleHint('${sectionId}', ${idx})" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-lg md:text-xl font-bold transition-all active:scale-95 text-amber-500 hover:bg-amber-50">💡 تلميح</button></div><h3 class="text-2xl md:text-3xl font-semibold text-slate-800 leading-snug whitespace-pre-line text-right">${q.text}</h3><div class="${showHint ? `block w-full ${hintFadeClass}` : 'hidden'}"><div class="mt-4 bg-amber-50 text-amber-900 p-4 rounded-xl text-xl font-medium border border-amber-200 flex gap-2 items-start text-right"><span class="text-amber-500 font-semibold mt-1 shrink-0">💡</span><span class="leading-relaxed">${q.hint}</span></div></div></div><div class="grid gap-3 mx-auto w-full max-w-md flex-grow grid-cols-1 content-start">${optionsHTML}</div><div class="${answered ? `block w-full ${answerFadeClass}` : 'hidden'}"><div class="mt-6 p-5 rounded-xl border text-right ${isSelectedCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}"><div class="flex items-center justify-start gap-2 mb-3 font-bold text-xl md:text-2xl ${isSelectedCorrect ? 'text-emerald-700' : 'text-rose-700'}">${isSelectedCorrect ? `<span class="text-emerald-700">${ICONS.checkCircleLarge}</span>` : `<span class="text-rose-700">${ICONS.xCircleLarge}</span>`}<span>${isSelectedCorrect ? 'إجابة صحيحة' : 'إجابة خاطئة'}</span></div><div class="text-xl md:text-2xl font-semibold leading-relaxed ${isSelectedCorrect ? 'text-emerald-800' : 'text-rose-800'} pr-1">${q.explanation}</div></div></div></div>`;
            },
            renderSort(sectionData) {
                const sectionId = sectionData.id; const theme = sectionData.theme; const state = this.state.sectionData[sectionId]; const { questions, currentIndex, status, animatingOut } = state; const isComplete = currentIndex >= questions.length;
                let html = '<div class="flex flex-col items-center w-full gap-6 fade-in">';

                let boxesHTML = ''; if (!isComplete) {
                    const colors = ['emerald', 'violet', 'cyan', 'teal', 'indigo'];
                    state.questions[currentIndex].options.forEach((opt, idx) => {
                        const boxTheme = colors[idx % colors.length]; let btnClass = `flex-1 flex flex-col items-center justify-center p-3 md:p-5 border-2 md:border-4 rounded-xl md:rounded-2xl transition-all duration-300 border-${boxTheme}-200 text-${boxTheme}-700 bg-${boxTheme}-50 `;
                        if (!animatingOut && status !== 'correct') { btnClass += `hover:border-${boxTheme}-400 hover:bg-${boxTheme}-100 hover:-translate-y-1 cursor-pointer shadow-sm hover:shadow-md active:scale-95`; } else { btnClass += `opacity-60 cursor-default grayscale-[30%]`; }
                        boxesHTML += `<button ${(!animatingOut && status !== 'correct') ? `onclick="App.handleDynamicSortClick('${sectionId}', ${idx})"` : 'disabled'} class="${btnClass} min-w-[120px]"><span class="font-bold text-lg md:text-xl text-center leading-snug">${opt.text}</span></button>`;
                    });

                else if (sectionDef.type === 'error_correction') { const qState = this.state.sectionData[sectionId][idx]; qState.showHint = !qState.showHint; document.getElementById(`${sectionId}-wrapper-${idx}`).innerHTML = this.renderErrorCard(qState, idx, sectionDef.theme, sectionId); }
                else if (sectionDef.type === 'spotting') { const qState = this.state.sectionData[sectionId][idx]; qState.showHint = !qState.showHint; document.getElementById(`${sectionId}-wrapper-${idx}`).innerHTML = this.renderSpottingCard(qState, idx, sectionDef.theme, sectionId); }
                else if (sectionDef.type === 'flashcards') { const state = this.state.sectionData[sectionId]; state.showHint = !state.showHint; this.updateUI(); }
                else { const qState = this.state.sectionData[sectionId][idx]; qState.showHint = !qState.showHint; qState.hintAnimate = qState.showHint; document.getElementById(`${sectionId}-wrapper-${idx}`).innerHTML = this.renderQuestionCard(qState, idx, sectionId, sectionDef.theme, sectionDef.type); qState.hintAnimate = false; }
            },
            handleAnswer(sectionId, qIndex, optIndex) {
                const qState = this.state.sectionData[sectionId][qIndex]; if (qState.answered) return;
                const selectedOption = qState.options[optIndex]; qState.answered = true; qState.selectedOption = selectedOption; qState.answerAnimate = true;
                this.recordProgress(sectionId, selectedOption.isCorrect);
                const progress = this.state.progress[sectionId]; if (progress.answered === progress.total) { this.updateUI(); } else { const sectionDef = APP_DATA.sections.find(s => s.id === sectionId); document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderQuestionCard(qState, qIndex, sectionId, sectionDef.theme, sectionDef.type); this.updateTabs(); this.checkFinalEvaluation(); }
                qState.answerAnimate = false;
            },
            handleDynamicSortClick(sectionId, optIndex) {
                const state = this.state.sectionData[sectionId]; if (state.status === 'correct' || state.animatingOut) return;
                const currentQState = state.questions[state.currentIndex]; const isCorrect = currentQState.options[optIndex].isCorrect;
                if (isCorrect) { const isFirstAttempt = state.status === 'idle'; this.state.progress[sectionId].answered++; if (isFirstAttempt) { this.state.progress[sectionId].score++; } state.status = 'correct'; state.animatingOut = true; this.updateUI(); setTimeout(() => { state.currentIndex++; state.status = 'idle'; state.animatingOut = false; this.updateUI(); }, 400); } else { state.status = 'incorrect'; this.updateUI(); }
            },
            handleFlashcardFlip(sectionId) { const state = this.state.sectionData[sectionId]; if (state.animatingOut) return; state.isFlipped = !state.isFlipped; const cardInner = document.getElementById(`flashcard-inner-${sectionId}`); if (cardInner) { if (state.isFlipped) cardInner.classList.add('rotate-y-180'); else cardInner.classList.remove('rotate-y-180'); } },
            handleFlashcardAnswer(sectionId, isCorrect) {
                const state = this.state.sectionData[sectionId]; if (state.animatingOut) return;
                this.state.progress[sectionId].answered++; if (isCorrect) this.state.progress[sectionId].score++;
                state.animatingOut = true; this.updateUI();
                setTimeout(() => { state.currentIndex++; state.isFlipped = false; state.animatingOut = false; state.showHint = false; if (state.currentIndex >= state.cards.length) this.checkFinalEvaluation(); this.updateUI(); }, 400);
            },
            handleErrorWordClick(sectionId, qIndex, wIndex) {
                const qState = this.state.sectionData[sectionId][qIndex]; if (qState.step !== 1) return;
                const isCorrectError = wIndex === qState.originalQuestion.errorWordIndex;
                if (isCorrectError) { qState.selectedWordIndex = wIndex; qState.step = 2; qState.shakeWordIndex = null; } else { qState.shakeWordIndex = wIndex; setTimeout(() => { if (this.state.sectionData[sectionId][qIndex]) { this.state.sectionData[sectionId][qIndex].shakeWordIndex = null; const sectionDef = APP_DATA.sections.find(s => s.id === sectionId); document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderErrorCard(qState, qIndex, sectionDef.theme, sectionId); } }, 500); }
                const sectionDef = APP_DATA.sections.find(s => s.id === sectionId); document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderErrorCard(qState, qIndex, sectionDef.theme, sectionId);
            },

            // --- دالة التحكم للنشاط الجديد (صائد الكلمات) ---
            handleSpottingWordClick(sectionId, qIndex, wIndex) {
                const qState = this.state.sectionData[sectionId][qIndex];
                if (qState.answered) return;

                const isCorrect = wIndex === qState.originalQuestion.targetIndex;

                if (isCorrect) {
                    qState.answered = true;
                    qState.selectedWordIndex = wIndex;
                    qState.answerAnimate = true;
                    this.recordProgress(sectionId, true);
                    const sectionDef = APP_DATA.sections.find(s => s.id === sectionId);

                    const progress = this.state.progress[sectionId];
                    if (progress.answered === progress.total) { this.updateUI(); }
                    else { document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderSpottingCard(qState, qIndex, sectionDef.theme, sectionId); this.updateTabs(); this.checkFinalEvaluation(); }
                    qState.answerAnimate = false;
                } else {
                    qState.shakeWordIndex = wIndex;
                    const sectionDef = APP_DATA.sections.find(s => s.id === sectionId);
                    document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderSpottingCard(qState, qIndex, sectionDef.theme, sectionId);

                    setTimeout(() => {
                        if (this.state.sectionData[sectionId][qIndex]) {
                            this.state.sectionData[sectionId][qIndex].shakeWordIndex = null;
                            document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderSpottingCard(qState, qIndex, sectionDef.theme, sectionId);
                        }
                    }, 500);
                }
            },

            handleErrorOptionClick(sectionId, qIndex, optIndex) {
                const qState = this.state.sectionData[sectionId][qIndex]; if (qState.step !== 2) return;
                const selectedOption = qState.options[optIndex]; qState.step = 3; qState.selectedOption = selectedOption; qState.answerAnimate = true;
                this.recordProgress(sectionId, selectedOption.isCorrect);
                const progress = this.state.progress[sectionId]; if (progress.answered === progress.total) { this.updateUI(); } else { const sectionDef = APP_DATA.sections.find(s => s.id === sectionId); document.getElementById(`${sectionId}-wrapper-${qIndex}`).innerHTML = this.renderErrorCard(qState, qIndex, sectionDef.theme, sectionId); this.updateTabs(); this.checkFinalEvaluation(); }
                qState.answerAnimate = false;
            },
            handleClassifyClick(sectionId, categoryId) {
                const state = this.state.sectionData[sectionId]; if (state.status === 'correct' || state.animatingOut) return;
                const currentQState = state.questions[state.currentIndex]; const currentQ = currentQState.originalQuestion; const isCorrect = categoryId === currentQ.categoryId;
                if (isCorrect) { const isFirstAttempt = state.status === 'idle'; this.state.progress[sectionId].answered++; if (isFirstAttempt) this.state.progress[sectionId].score++; state.status = 'correct'; state.placedItems[categoryId].push(currentQ); state.animatingOut = true; this.updateUI(); setTimeout(() => { state.currentIndex++; state.status = 'idle'; state.animatingOut = false; this.updateUI(); }, 400); } else { state.status = 'incorrect'; this.updateUI(); }
            },
            recordProgress(sectionId, isCorrect) { this.state.progress[sectionId].answered++; if (isCorrect) this.state.progress[sectionId].score++; },
            scrollToContent() { requestAnimationFrame(() => { setTimeout(() => { const target = document.getElementById('scroll-target'); if (target) { const stickyTabs = document.getElementById('sticky-tabs-container'); const headerOffset = stickyTabs ? stickyTabs.offsetHeight : 80; const elementPosition = target.getBoundingClientRect().top; const offsetPosition = elementPosition + window.pageYOffset - headerOffset; window.scrollTo({ top: offsetPosition, behavior: 'smooth' }); } }, 30); }); },
            scrollTabIntoView(tabId) { requestAnimationFrame(() => { setTimeout(() => { const tabBtn = document.getElementById(`tab-${tabId}`); const container = document.getElementById('tabs-container'); if (tabBtn && container) { const containerRect = container.getBoundingClientRect(); const btnRect = tabBtn.getBoundingClientRect(); if (tabId === APP_DATA.sections[0].id) { container.scrollBy({ left: (btnRect.right - containerRect.right) + 16, behavior: 'smooth' }); } else { container.scrollBy({ left: (btnRect.left + btnRect.width / 2) - (containerRect.left + containerRect.width / 2), behavior: 'smooth' }); } } }, 30); }); },
            handleTabChange(tabId) { this.state.activeTab = tabId; this.updateUI(); this.scrollToContent(); this.scrollTabIntoView(tabId); },
            handleNextSection() { const currentIndex = APP_DATA.sections.findIndex(s => s.id === this.state.activeTab); if (currentIndex < APP_DATA.sections.length - 1) this.handleTabChange(APP_DATA.sections[currentIndex + 1].id); },
            handleResetSection(sectionId) {
                const secDef = APP_DATA.sections.find(s => s.id === sectionId); this.state.progress[sectionId].answered = 0; this.state.progress[sectionId].score = 0;
                if (secDef.type === 'mcq') this.state.sectionData[sectionId] = secDef.questions.map(q => ({ originalQuestion: q, options: shuffleArray(q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correct }))), answered: false, selectedOption: null, showHint: false }));
                else if (secDef.type === 'classify') { let placedItems = {}; secDef.categories.forEach(c => placedItems[c.id] = []); this.state.sectionData[sectionId] = { questions: shuffleArray(secDef.questions).map(q => ({ originalQuestion: q, showHint: false })), currentIndex: 0, status: 'idle', placedItems: placedItems, animatingOut: false }; }
                else if (secDef.type === 'error_correction') this.state.sectionData[sectionId] = secDef.questions.map(q => ({ originalQuestion: q, options: shuffleArray(q.options.map((opt, oIdx) => ({ text: opt, isCorrect: oIdx === q.correctOptionIndex }))), step: 1, selectedWordIndex: null, selectedOption: null, showHint: false, shakeWordIndex: null }));
                else if (secDef.type === 'flashcards') this.state.sectionData[sectionId] = { cards: secDef.cards, currentIndex: 0, isFlipped: false, animatingOut: false, showHint: false };
                else if (secDef.type === 'sort') this.state.sectionData[sectionId] = { questions: secDef.questions.map(q => ({ originalQuestion: q, options: q.options.map((opt, i) => ({ text: opt, isCorrect: i === q.correct })), showHint: false })), currentIndex: 0, status: 'idle', animatingOut: false };
                else if (secDef.type === 'spotting') this.state.sectionData[sectionId] = secDef.questions.map(q => ({ originalQuestion: q, answered: false, selectedWordIndex: null, showHint: false, shakeWordIndex: null })); // تحديث إرجاع نشاط صائد الكلمات
                this.updateUI(); this.scrollToContent();
            },
            handleGlobalRestart() { this.initSectionData(); if (APP_DATA.sections.length > 0) this.state.activeTab = APP_DATA.sections[0].id; this.updateUI(); this.scrollTabIntoView(this.state.activeTab); requestAnimationFrame(() => { const header = document.getElementById('main-header'); window.scrollTo({ top: header ? header.offsetHeight : 80, behavior: 'smooth' }); }); },
            checkFinalEvaluation() {
                const scorableSections = APP_DATA.sections.filter(s => s.type !== 'intro'); if (scorableSections.length === 0) return;
                const isAllComplete = scorableSections.every(s => { const p = this.state.progress[s.id]; return p && p.total > 0 && p.answered === p.total; });
                const container = document.getElementById('final-evaluation-container'); const activeSecDef = APP_DATA.sections.find(s => s.id === this.state.activeTab);
                if (isAllComplete && activeSecDef.type !== 'intro') {
                    let totalScore = 0, totalQuestions = 0; scorableSections.forEach(s => { totalScore += this.state.progress[s.id].score; totalQuestions += this.state.progress[s.id].total; });
                    const percentage = Math.round((totalScore / totalQuestions) * 100); let message = "", color = "";
                    if (percentage < 60) { message = "تحتاج إلى مزيد من التدريب، لا تيأس وحاول مرة أخرى!"; color = "text-rose-600"; } else if (percentage < 85) { message = "أداء رائع! مستواك جيد جدًا."; color = "text-violet-600"; } else { message = "أداء استثنائي! أنت بطل حقيقي وخبير في هذا الدرس."; color = "text-emerald-600"; }
                    container.innerHTML = `<div id="final-eval-box" class="mt-12 bg-white p-8 md:p-12 rounded-3xl shadow-lg border-2 border-amber-200 text-center fade-in">${ICONS.medal}<h2 class="text-3xl md:text-4xl font-bold text-slate-700 mb-6">التقييم النهائي</h2><div class="text-6xl md:text-7xl font-bold mb-8 text-slate-700 flex items-center justify-center gap-4"><span class="${color}">${toArabicNum(totalScore)}</span><span class="text-slate-400 text-3xl md:text-4xl font-medium mt-2">من</span><span class="text-slate-500">${toArabicNum(totalQuestions)}</span></div><div class="inline-block bg-amber-100 text-amber-800 px-6 py-2 rounded-full font-semibold text-xl md:text-2xl mb-6">النسبة المئوية: ${toArabicNum(percentage)}%</div><p class="text-xl md:text-2xl font-semibold leading-relaxed ${color} mb-10">${message}</p><button onclick="App.handleGlobalRestart()" class="px-8 md:px-10 py-3 md:py-4 rounded-full font-semibold text-xl md:text-2xl text-white bg-slate-700 hover:bg-slate-800 shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-3 mx-auto">${ICONS.refresh} ابدأ من جديد</button></div>`;
                } else { container.innerHTML = ''; }
            }
        };
        document.addEventListener('DOMContentLoaded', () => { try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; window.scrollTo(0, 0); } catch (e) { } App.init(); });
    </script>
</body>
